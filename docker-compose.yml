services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: dan
      POSTGRES_PASSWORD: social123
      POSTGRES_DB: social
    volumes:
      - pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dan -d social"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://dan:social123@db:5432/social
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pg:
